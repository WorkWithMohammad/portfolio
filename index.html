<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Browse jobs · JobNest</title>
<link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
<header class="topbar">
  <a class="brand" href="../index.html"><span class="logo">●</span> JobNest</a>
  <nav class="topnav">
    <a href="jobs.html">Jobs</a>
    <span id="authNav"></span>
  </nav>
</header>

<main style="max-width:1200px;margin:1.5rem auto;padding:0 1.4rem">
  <div class="page-head">
    <div>
      <h1>Find your next role</h1>
      <p>Browse open positions from companies on JobNest.</p>
    </div>
  </div>

  <form class="toolbar" id="filters" onsubmit="event.preventDefault()">
    <input type="search" name="q" placeholder="Search title, company, description…" />
    <select name="skill"><option value="">All skills</option></select>
    <select name="type">
      <option value="">All types</option>
      <option>Full-time</option><option>Part-time</option>
      <option>Contract</option><option>Hybrid</option><option>Remote</option>
    </select>
  </form>

  <section class="grid cols-3" id="jobList"></section>
</main>

<script src="../js/storage.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/jobs.js"></script>
<script>
  Store.seedIfEmpty();
  const user = Auth.current();
  const nav = document.getElementById('authNav');
  if (user) {
    nav.innerHTML = `<a href="${user.role==='applicant'?'applicant-dashboard.html':'company-dashboard.html'}" class="btn btn-primary">Dashboard</a>`;
  } else {
    nav.innerHTML = `<a href="../index.html" class="btn btn-primary">Login / Sign up</a>`;
  }
  JobsUI.mountBoard({
    container: document.getElementById('jobList'),
    toolbar: document.getElementById('filters'),
    currentUser: user,
  });
</script>
</body>
</html>
